<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            color: white;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 600px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 1.3em;
        }

        .score {
            font-weight: bold;
        }

        canvas {
            background-color: #1a1a2e;
            border: 4px solid white;
            border-radius: 5px;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            max-width: 600px;
        }

        .controls h3 {
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .controls p {
            margin: 5px 0;
            font-size: 0.95em;
        }

        .reset-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.1em;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .reset-btn:hover {
            background-color: #764ba2;
        }

        .reset-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div>
                <p>Player</p>
                <p class="score" id="playerScore">0</p>
            </div>
            <div>
                <p>Computer</p>
                <p class="score" id="computerScore">0</p>
            </div>
        </div>

        <canvas id="pongCanvas" width="600" height="400"></canvas>

        <div class="controls">
            <h3>Controls</h3>
            <p>🖱️ Move mouse up/down OR ⬆️⬇️ Use arrow keys</p>
            <p>Left paddle is yours, right paddle is computer controlled</p>
            <p>First to 11 points wins!</p>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 12;
        const paddleHeight = 80;
        const ballSize = 8;

        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 4.5
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            size: ballSize,
            speed: 5
        };

        let playerScore = 0;
        let computerScore = 0;

        // Input handling
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        let mouseY = canvas.height / 2;

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        // Update game state
        function update() {
            // Player paddle movement
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                player.y = Math.max(0, player.y - player.speed);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                player.y = Math.min(canvas.height - player.height, player.y + player.speed);
            }

            // Mouse control for player
            if (mouseY > player.y + player.height / 2) {
                player.y = Math.min(canvas.height - player.height, player.y + player.speed);
            } else if (mouseY < player.y + player.height / 2) {
                player.y = Math.max(0, player.y - player.speed);
            }

            // Computer AI (tracks ball with slight delay)
            const computerPaddleCenter = computer.y + computer.height / 2;
            if (computerPaddleCenter < ball.y - 35) {
                computer.y = Math.min(canvas.height - computer.height, computer.y + computer.speed);
            } else if (computerPaddleCenter > ball.y + 35) {
                computer.y = Math.max(0, computer.y - computer.speed);
            }

            // Ball movement
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom walls
            if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.size, Math.min(canvas.height - ball.size, ball.y));
            }

            // Ball collision with paddles
            if (
                ball.x - ball.size < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.size;
                // Add spin based on where ball hits paddle
                ball.dy += (ball.y - (player.y + player.height / 2)) / 20;
            }

            if (
                ball.x + ball.size > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.size;
                // Add spin based on where ball hits paddle
                ball.dy += (ball.y - (computer.y + computer.height / 2)) / 20;
            }

            // Ball out of bounds (scoring)
            if (ball.x < 0) {
                computerScore++;
                resetBall();
                document.getElementById('computerScore').textContent = computerScore;
            }

            if (ball.x > canvas.width) {
                playerScore++;
                resetBall();
                document.getElementById('playerScore').textContent = playerScore;
            }

            // Limit ball speed
            const maxDy = 8;
            if (ball.dy > maxDy) ball.dy = maxDy;
            if (ball.dy < -maxDy) ball.dy = -maxDy;
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw player paddle
            ctx.fillStyle = '#00d4ff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowColor = '#00d4ff';
            ctx.shadowBlur = 10;

            // Draw computer paddle
            ctx.fillStyle = '#ff006e';
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);
            ctx.shadowColor = '#ff006e';
            ctx.shadowBlur = 10;

            // Draw ball
            ctx.fillStyle = '#ffd60a';
            ctx.shadowColor = '#ffd60a';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fill();

            // Reset shadow
            ctx.shadowColor = 'transparent';
        }

        // Reset ball position
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 4;
        }

        // Reset entire game
        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
            resetBall();
            player.y = canvas.height / 2 - player.height / 2;
            computer.y = canvas.height / 2 - computer.height / 2;
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
